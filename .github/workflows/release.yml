name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore .\Wahee.sln

      - name: Build
        run: dotnet build .\Wahee.sln -c Release --no-restore

      - name: Publish (win-x64 self-contained)
        run: dotnet publish .\Wahee.UI\Wahee.UI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .\artifacts\Wahee-win-x64

      - name: Zip Artifact
        run: Compress-Archive -Path .\artifacts\Wahee-win-x64\* -DestinationPath .\artifacts\Wahee-win-x64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .\artifacts\Wahee-win-x64.zip
          generate_release_notes: true
