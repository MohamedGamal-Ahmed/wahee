name: Feature request
description: Suggest an improvement or a new feature
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "شاركنا فكرتك لتحسين التجربة."
  - type: input
    id: title
    attributes:
      label: Feature title
      placeholder: "Short feature name"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
